<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We The Loot | Live Roster</title>
    <style>
        /* High-contrast, institutional aesthetic */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            font-weight: 800;
        }

        /* Green Ticker Container */
        .ticker-container {
            border: 1px solid #1a1a1a;
            background: #0a0a0a;
            padding: 1.25rem 3rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.05);
        }

        /* Pulsing Status Indicator */
        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff66;
            animation: pulse 2s infinite;
        }

        .ticker-text {
            font-size: 1.5rem;
            color: #00ff66;
            font-family: monospace;
            letter-spacing: 0.05em;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }
    </style>
</head>
<body>

    <h1>We The Loot</h1>
    
    <div class="ticker-container">
        <div class="status-dot"></div>
        <div class="ticker-text">ACTIVE MEMBERS: <span id="memberCount">14,204</span></div>
    </div>

    <script>
        // Simulation logic for live member growth
        let currentMembers = 14204; // Baseline starting number
        const countElement = document.getElementById('memberCount');

        function updateTicker() {
            // Adds realistic pacing; members don't join at perfectly even intervals
            const someoneJoined = Math.random() > 0.2; 
            
            if (someoneJoined) {
                // Batch joining: 1 to 4 members at a time
                const newMembers = Math.floor(Math.random() * 4) + 1;
                currentMembers += newMembers;
                
                // Format with commas for readability
                countElement.innerText = currentMembers.toLocaleString();
            }

            // Randomize the next update between 1.5 and 3.5 seconds
            const nextUpdate = Math.floor(Math.random() * 2000) + 1500;
            setTimeout(updateTicker, nextUpdate);
        }

        // Initialize the sequence
        setTimeout(updateTicker, 1500);
    </script>

</body>
</html>
