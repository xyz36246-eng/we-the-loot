<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We The Loot | Live Roster</title>
    <style>
        /* High-contrast, institutional aesthetic */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            font-weight: 800;
        }

        /* Green Ticker Container */
        .ticker-container {
            border: 1px solid #1a1a1a;
            background: #0a0a0a;
            padding: 1.25rem 3rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.05);
        }

        /* Pulsing Status Indicator */
        .status-dot {
            width: 12px;
            height: 12px;
            background-color: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff66;
            animation: pulse 2s infinite;
        }

        .ticker-text {
            font-size: 1.5rem;
            color: #00ff66;
            font-family: monospace;
            letter-spacing: 0.05em;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }
    </style>
</head>
<body>

    <h1>We The Loot</h1>
    
    <div class="ticker-container">
        <div class="status-dot"></div>
        <div class="ticker-text">ACTIVE MEMBERS: <span id="memberCount">14,204</span></div>
    </div>

    <script>
        // Configuration Parameters
        const START_MEMBERS = 14204;
        const TARGET_MEMBERS = 3475609;
        const DURATION_MS = 24 * 60 * 60 * 1000; // 24 hours in milliseconds
        
        // Calculate the rate of joining per millisecond to reach the target exactly on time
        const RAPID_RATE = (TARGET_MEMBERS - START_MEMBERS) / DURATION_MS; 
        
        // The slower rate after 24 hours (e.g., roughly 1 member every 2 seconds)
        const SLOW_RATE = 0.0005; 

        // Check local storage for an existing start time. If none exists, set it to right now.
        let startTime = localStorage.getItem('lootDeploymentTime');
        if (!startTime) {
            startTime = Date.now();
            localStorage.setItem('lootDeploymentTime', startTime);
        } else {
            // Convert the stored string back into a number
            startTime = parseInt(startTime, 10);
        }

        const countElement = document.getElementById('memberCount');

        function calculateCurrentMembers() {
            const now = Date.now();
            const elapsed = now - startTime;

            if (elapsed < DURATION_MS) {
                // We are still within the first 24 hours
                return Math.floor(START_MEMBERS + (elapsed * RAPID_RATE));
            } else {
                // 24 hours have passed. Add the slow rate to the target number.
                const timeAfterTarget = elapsed - DURATION_MS;
                return Math.floor(TARGET_MEMBERS + (timeAfterTarget * SLOW_RATE));
            }
        }

        function updateTicker() {
            const currentMembers = calculateCurrentMembers();
            
            // Format with commas for readability and update the DOM
            countElement.innerText = currentMembers.toLocaleString();

            // Randomize the visual update interval slightly (between 100ms and 400ms) 
            // so the ticking looks organic rather than perfectly robotic.
            const nextUpdate = Math.floor(Math.random() * 300) + 100;
            setTimeout(updateTicker, nextUpdate);
        }

        // Initialize the sequence
        updateTicker();
    </script>

</body>
</html>
